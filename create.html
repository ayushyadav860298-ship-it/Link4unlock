<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Link - Link4Unlock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;line-height:1.5;}
        .container{max-width:800px;margin:0 auto;padding:0 20px;}
        
        .navbar{background:rgba(15,15,26,0.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.08);padding:16px 0;}
        .nav-wrapper{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;padding:0 20px;}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none;font-size:1.4rem;font-weight:700;}
        .logo i{color:#667eea;}
        .logo span{background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .btn-create{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:8px 20px;border-radius:40px;text-decoration:none;font-weight:600;}
        
        .create-page{padding:60px 0;}
        .create-header{text-align:center;margin-bottom:40px;}
        .create-header h1{font-size:2rem;}
        .create-header p{color:#a0a0b0;}
        
        .create-card{background:rgba(255,255,255,0.04);padding:32px;border-radius:24px;border:1px solid rgba(255,255,255,0.08);}
        
        .form-group{margin-bottom:24px;}
        .form-group label{display:block;margin-bottom:8px;font-weight:600;}
        .form-group input{width:100%;padding:14px 16px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:1rem;}
        .form-group input:focus{outline:none;border-color:#667eea;}
        
        .tasks-section{margin:32px 0;}
        .tasks-buttons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
        .task-btn{background:rgba(0,0,0,0.3);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer;color:#fff;transition:all 0.3s;}
        .task-btn.selected{border-color:#28a745;background:rgba(40,167,69,0.1);}
        .task-btn i:first-child{font-size:1.2rem;}
        .task-btn span{flex:1;text-align:left;}
        
        .task-urls-container{margin-top:20px;padding:20px;background:rgba(0,0,0,0.2);border-radius:16px;}
        .task-url-input{margin-bottom:20px;padding:16px;background:rgba(0,0,0,0.2);border-radius:12px;}
        .input-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-weight:600;}
        .task-url-input input{width:100%;padding:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;}
        
        .create-btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:40px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;margin-top:16px;}
        
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:all 0.3s;}
        .modal-overlay.active{visibility:visible;opacity:1;}
        .modal-content{background:linear-gradient(135deg,#1a1a2e,#0f0f1a);border-radius:24px;padding:32px;max-width:450px;width:90%;text-align:center;border:1px solid rgba(255,255,255,0.1);}
        .modal-content h3{margin-bottom:8px;}
        .modal-link-box{background:rgba(0,0,0,0.5);padding:14px;border-radius:12px;margin:20px 0;word-break:break-all;color:#667eea;font-size:0.9rem;}
        .modal-buttons{display:flex;gap:12px;justify-content:center;}
        .modal-copy-btn{background:#28a745;border:none;padding:12px 24px;border-radius:40px;color:#fff;font-weight:600;cursor:pointer;}
        .modal-new-btn{background:transparent;border:1px solid rgba(255,255,255,0.2);padding:12px 24px;border-radius:40px;color:#fff;cursor:pointer;}
        .close-modal{float:right;font-size:24px;cursor:pointer;color:#a0a0b0;}
        
        @media (max-width:600px){.create-card{padding:20px;}}
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-wrapper">
        <a href="index.html" class="logo"><i class="fas fa-unlock-alt"></i><span>Link4Unlock</span></a>
        <a href="create.html" class="btn-create">Create Link</a>
    </div>
</nav>

<div class="create-page">
    <div class="container">
        <div class="create-header">
            <h1><i class="fas fa-plus-circle"></i> Create Unlock Link</h1>
            <p>Users must complete <strong>ALL tasks</strong> to unlock</p>
        </div>

        <div class="create-card">
            <div class="form-group">
                <label><i class="fas fa-link"></i> Enter Destination or File URL Link</label>
                <input type="text" id="destinationUrl" placeholder="https://your-file.zip or https://secret-page.com">
            </div>

            <div class="tasks-section">
                <label><i class="fas fa-tasks"></i> Select Tasks (User must complete ALL)</label>
                <div class="tasks-buttons-grid" id="tasksButtonsGrid"></div>
                <div id="taskUrlsContainer" class="task-urls-container"></div>
            </div>

            <button onclick="createLink()" class="create-btn"><i class="fas fa-magic"></i> Generate Link</button>
        </div>
    </div>
</div>

<div id="linkModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-icon">🎉</div>
        <h3>Your link is generated successfully</h3>
        <p>Copy and share this link anywhere</p>
        <div class="modal-link-box" id="modalLink"></div>
        <div class="modal-buttons">
            <button class="modal-copy-btn" onclick="copyModalLink()"><i class="fas fa-copy"></i> Copy</button>
            <button class="modal-new-btn" onclick="generateNewUrl()"><i class="fas fa-sync-alt"></i> Generate new URL</button>
        </div>
    </div>
</div>

<script>
    const allTasks = [
        { id: 'subscribe', icon: 'fab fa-youtube', name: 'Subscribe', color: '#FF0000', placeholder: 'YouTube Channel URL' },
        { id: 'subscribe2', icon: 'fab fa-youtube', name: '2nd Subscribe', color: '#FF0000', placeholder: 'YouTube Channel URL' },
        { id: 'like_subscribe', icon: 'fas fa-thumbs-up', name: 'Like & Subscribe', color: '#3b5998', placeholder: 'YouTube URL' },
        { id: 'sub_bell', icon: 'fas fa-bell', name: 'Sub & Hit Bell', color: '#FF0000', placeholder: 'YouTube Channel URL' },
        { id: 'like_comment', icon: 'fas fa-comment', name: 'Like & Comment', color: '#FF0000', placeholder: 'YouTube Video URL' },
        { id: 'like_video', icon: 'fas fa-thumbs-up', name: 'Like Video', color: '#3b5998', placeholder: 'YouTube Video URL' },
        { id: 'instagram', icon: 'fab fa-instagram', name: 'Follow Instagram', color: '#E4405F', placeholder: 'Instagram Profile URL' },
        { id: 'telegram', icon: 'fab fa-telegram', name: 'Join Telegram', color: '#26A5E4', placeholder: 'Telegram Invite Link' },
        { id: 'discord', icon: 'fab fa-discord', name: 'Join Discord', color: '#5865F2', placeholder: 'Discord Invite Link' }
    ];
    
    let selectedTasks = [];
    
    function renderTasksButtons() {
        const container = document.getElementById('tasksButtonsGrid');
        container.innerHTML = '';
        allTasks.forEach(task => {
            const isSelected = selectedTasks.some(t => t.id === task.id);
            const btn = document.createElement('button');
            btn.className = `task-btn ${isSelected ? 'selected' : ''}`;
            btn.onclick = () => toggleTask(task);
            btn.innerHTML = `<i class="${task.icon}" style="color:${task.color}"></i><span>${task.name}</span>${isSelected ? ' ✓' : ' +'}`;
            container.appendChild(btn);
        });
        renderUrlInputs();
    }
    
    function toggleTask(task) {
        const index = selectedTasks.findIndex(t => t.id === task.id);
        if(index === -1) {
            selectedTasks.push({ ...task, url: '' });
        } else {
            selectedTasks.splice(index, 1);
        }
        renderTasksButtons();
    }
    
    function renderUrlInputs() {
        const container = document.getElementById('taskUrlsContainer');
        if(selectedTasks.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#a0a0b0;"><i class="fas fa-info-circle"></i> Select tasks above to add their URLs</div>';
            return;
        }
        container.innerHTML = '<h4 style="margin-bottom:16px;"><i class="fas fa-link"></i> Enter URLs for selected tasks</h4>';
        selectedTasks.forEach((task, idx) => {
            const div = document.createElement('div');
            div.className = 'task-url-input';
            div.innerHTML = `
                <div class="input-header"><i class="${task.icon}" style="color:${task.color}"></i><span>${task.name}</span></div>
                <input type="text" id="url_${task.id}" placeholder="${task.placeholder}" value="${task.url || ''}" onchange="updateTaskUrl(${idx}, this.value)">
            `;
            container.appendChild(div);
        });
    }
    
    function updateTaskUrl(index, url) { selectedTasks[index].url = url; }
    
    function createLink() {
        const destination = document.getElementById('destinationUrl').value;
        if(!destination) { alert('Enter destination URL!'); return; }
        if(selectedTasks.length === 0) { alert('Select at least one task!'); return; }
        
        const missing = selectedTasks.filter(t => !t.url.trim());
        if(missing.length) { alert(`Enter URLs for: ${missing.map(t=>t.name).join(', ')}`); return; }
        
        const tasksData = selectedTasks.map(t => ({ id:t.id, name:t.name, icon:t.icon, color:t.color, url:t.url }));
        const linkData = { d: destination, t: tasksData };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(linkData))));
        
        // SHORT CODE - sirf 5 characters
        const shortCode = Math.random().toString(36).substr(2, 5);
        
        // SHORT LINK FORMAT: sitename/abc123
        const fullLink = `${window.location.origin}/${shortCode}`;
        
        // Store in localStorage permanently
        let savedLinks = JSON.parse(localStorage.getItem('link4unlock_permanent') || '{}');
        savedLinks[shortCode] = encoded;
        localStorage.setItem('link4unlock_permanent', JSON.stringify(savedLinks));
        
        document.getElementById('modalLink').innerText = fullLink;
        document.getElementById('linkModal').classList.add('active');
    }
    
    function copyModalLink() {
        const linkText = document.getElementById('modalLink').innerText;
        navigator.clipboard.writeText(linkText);
        const copyBtn = document.querySelector('.modal-copy-btn');
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => { copyBtn.innerHTML = originalText; }, 2000);
    }
    
    function generateNewUrl() {
        document.getElementById('destinationUrl').value = '';
        selectedTasks = [];
        renderTasksButtons();
        closeModal();
    }
    
    function closeModal() { document.getElementById('linkModal').classList.remove('active'); }
    
    document.getElementById('linkModal').addEventListener('click', function(e) {
        if(e.target === this) closeModal();
    });
    
    renderTasksButtons();
</script>
</body>
</html>
