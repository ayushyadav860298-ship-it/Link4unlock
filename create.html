<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <title>Create Unlock Link - Link4Unlock | Free Link Generator</title>
    <meta name="description" content="Create your own protected unlock link. Add tasks like YouTube subscribe, Instagram follow, Telegram join. Free, no signup, unlimited links.">
    <meta name="keywords" content="create unlock link, link generator, protect content, subscribe to unlock generator">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://link4unlock.github.io/create.html">
    
    <meta property="og:title" content="Create Unlock Link - Link4Unlock">
    <meta property="og:description" content="Create your own protected unlock link. Free, no signup, unlimited links.">
    <meta property="og:url" content="https://link4unlock.github.io/create.html">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Create Unlock Link - Link4Unlock">
    <meta name="twitter:description" content="Create your own protected unlock link. Free, no signup.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <div class="nav-wrapper">
            <a href="index.html" class="logo"><i class="fas fa-unlock-alt"></i><span>Link4Unlock</span></a>
            <div class="nav-links"><a href="index.html">Home</a><a href="create.html">Create Link</a><a href="about.html">About</a></div>
            <a href="create.html" class="btn-create">Create Link</a>
            <button class="mobile-menu-btn">☰</button>
        </div>
    </div>
</nav>

<div class="create-page">
    <div class="container">
        <div class="create-header">
            <h1><i class="fas fa-plus-circle"></i> Create Unlock Link</h1>
            <p>Users must complete <strong>ALL tasks</strong> to unlock your content</p>
        </div>

        <div class="create-card">
            <div class="form-group">
                <label><i class="fas fa-link"></i> Enter Destination or File URL Link</label>
                <input type="text" id="destinationUrl" placeholder="https://your-file.zip or https://secret-page.com">
            </div>

            <div class="tasks-section">
                <label><i class="fas fa-tasks"></i> Select Tasks (User must complete ALL)</label>
                <div class="tasks-buttons-grid" id="tasksButtonsGrid"></div>
                <div id="taskUrlsContainer" class="task-urls-container"></div>
            </div>

            <button onclick="createLink()" class="create-btn"><i class="fas fa-magic"></i> Generate Short Link</button>
        </div>
    </div>
</div>

<div id="linkModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-icon">🎉</div>
        <h3>Your link is generated successfully</h3>
        <p>Copy and share this link anywhere</p>
        <div class="modal-link-box" id="modalLink"></div>
        <div class="modal-buttons">
            <button class="modal-copy-btn" onclick="copyModalLink()"><i class="fas fa-copy"></i> Copy</button>
            <button class="modal-new-btn" onclick="generateNewUrl()"><i class="fas fa-sync-alt"></i> Generate new URL</button>
        </div>
    </div>
</div>

<script>
    const allTasks = [
        { id: 'subscribe', icon: 'fab fa-youtube', name: 'Subscribe', color: '#FF0000', placeholder: 'YouTube Channel URL' },
        { id: 'subscribe2', icon: 'fab fa-youtube', name: '2nd Subscribe', color: '#FF0000', placeholder: 'YouTube Channel URL' },
        { id: 'like_subscribe', icon: 'fas fa-thumbs-up', name: 'Like & Subscribe', color: '#3b5998', placeholder: 'YouTube URL' },
        { id: 'sub_bell', icon: 'fas fa-bell', name: 'Sub & Hit Bell', color: '#FF0000', placeholder: 'YouTube Channel URL' },
        { id: 'like_comment', icon: 'fas fa-comment', name: 'Like & Comment', color: '#FF0000', placeholder: 'YouTube Video URL' },
        { id: 'like_video', icon: 'fas fa-thumbs-up', name: 'Like Video', color: '#3b5998', placeholder: 'YouTube Video URL' },
        { id: 'instagram', icon: 'fab fa-instagram', name: 'Follow Instagram', color: '#E4405F', placeholder: 'Instagram Profile URL' },
        { id: 'telegram', icon: 'fab fa-telegram', name: 'Join Telegram', color: '#26A5E4', placeholder: 'Telegram Invite Link' },
        { id: 'discord', icon: 'fab fa-discord', name: 'Join Discord', color: '#5865F2', placeholder: 'Discord Invite Link' }
    ];
    
    let selectedTasks = [];
    
    function renderTasksButtons() {
        const container = document.getElementById('tasksButtonsGrid');
        container.innerHTML = '';
        allTasks.forEach(task => {
            const isSelected = selectedTasks.some(t => t.id === task.id);
            const btn = document.createElement('button');
            btn.className = `task-btn ${isSelected ? 'selected' : ''}`;
            btn.onclick = () => toggleTask(task);
            btn.innerHTML = `<i class="${task.icon}" style="color:${task.color}"></i><span>${task.name}</span>${isSelected ? ' ✓' : ' +'}`;
            container.appendChild(btn);
        });
        renderUrlInputs();
    }
    
    function toggleTask(task) {
        const index = selectedTasks.findIndex(t => t.id === task.id);
        if(index === -1) {
            selectedTasks.push({ ...task, url: '' });
        } else {
            selectedTasks.splice(index, 1);
        }
        renderTasksButtons();
    }
    
    function renderUrlInputs() {
        const container = document.getElementById('taskUrlsContainer');
        if(selectedTasks.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#a0a0b0;"><i class="fas fa-info-circle"></i> Select tasks above to add their URLs</div>';
            return;
        }
        container.innerHTML = '<h4 style="margin-bottom:16px;"><i class="fas fa-link"></i> Enter URLs for selected tasks</h4>';
        selectedTasks.forEach((task, idx) => {
            const div = document.createElement('div');
            div.className = 'task-url-input';
            div.innerHTML = `
                <div class="input-header"><i class="${task.icon}" style="color:${task.color}"></i><span>${task.name}</span></div>
                <input type="text" id="url_${task.id}" placeholder="${task.placeholder}" value="${task.url || ''}" onchange="updateTaskUrl(${idx}, this.value)">
            `;
            container.appendChild(div);
        });
    }
    
    function updateTaskUrl(index, url) { selectedTasks[index].url = url; }
    
    function createLink() {
        const destination = document.getElementById('destinationUrl').value;
        if(!destination) { alert('Enter destination URL!'); return; }
        if(selectedTasks.length === 0) { alert('Select at least one task!'); return; }
        
        const missing = selectedTasks.filter(t => !t.url.trim());
        if(missing.length) { alert(`Enter URLs for: ${missing.map(t=>t.name).join(', ')}`); return; }
        
        const tasksData = selectedTasks.map(t => ({ id:t.id, name:t.name, icon:t.icon, color:t.color, url:t.url }));
        const linkData = { d: destination, t: tasksData };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(linkData))));
        
        const shortCode = Math.random().toString(36).substr(2, 5);
        
        // Store in localStorage permanently
        let savedLinks = JSON.parse(localStorage.getItem('link4unlock_permanent') || '{}');
        savedLinks[shortCode] = encoded;
        localStorage.setItem('link4unlock_permanent', JSON.stringify(savedLinks));
        
        // GitHub Pages compatible link
        const fullLink = `${window.location.origin}/unlock.html?code=${shortCode}`;
        
        document.getElementById('modalLink').innerText = fullLink;
        document.getElementById('linkModal').classList.add('active');
    }
    
    function copyModalLink() {
        const linkText = document.getElementById('modalLink').innerText;
        navigator.clipboard.writeText(linkText);
        const copyBtn = document.querySelector('.modal-copy-btn');
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => { copyBtn.innerHTML = originalText; }, 2000);
    }
    
    function generateNewUrl() {
        document.getElementById('destinationUrl').value = '';
        selectedTasks = [];
        renderTasksButtons();
        closeModal();
    }
    
    function closeModal() { document.getElementById('linkModal').classList.remove('active'); }
    
    document.getElementById('linkModal').addEventListener('click', function(e) {
        if(e.target === this) closeModal();
    });
    
    renderTasksButtons();
</script>
</body>
</html>
